<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estimator Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

  <div class="max-w-4xl w-full bg-gray-800 p-6 rounded-2xl shadow-lg sm:p-4">
    
    <!-- Contractor Info -->
    <div class="mb-6">
      <h2 class="text-3xl sm:text-2xl font-bold mb-4 text-center">Construction Estimator</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <input type="text" id="contractorName" placeholder="Contractor Name / Company" class="w-full min-w-0 p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none">
        <input type="email" id="email" placeholder="Email" class="w-full min-w-0 p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none">
        <input type="tel" id="phone" placeholder="Phone Number" class="w-full min-w-0 p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none">
        <input type="date" id="date" class="w-full min-w-0 p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none">
      </div>
    </div>

    <!-- Materials Table -->
    <div class="overflow-x-auto">
      <table class="min-w-full table-auto mb-6">
        <thead class="bg-gray-700">
          <tr>
            <th class="px-4 py-2">No</th>
            <th class="px-4 py-2">Material</th>
            <th class="px-4 py-2">Qty</th>
            <th class="px-4 py-2">Unit Cost (₣)</th>
            <th class="px-4 py-2">Total (₣)</th>
            <th class="px-4 py-2">Action</th>
          </tr>
        </thead>
        <tbody id="materialsBody"></tbody>
      </table>
    </div>

    <button id="addRowBtn" class="bg-green-600 px-6 py-3 rounded-xl hover:bg-green-500 w-full sm:w-auto mb-4 transition">Add Material</button>

    <!-- Grand Total -->
    <div class="mb-6 text-right text-xl font-bold">Grand Total: <span id="grandTotal">0</span> ₣</div>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row gap-4">
      <button id="downloadPdf" class="bg-blue-600 px-6 py-3 rounded-xl hover:bg-blue-500 w-full sm:w-auto transition">Download PDF</button>
      <button id="newEstimate" class="bg-gray-700 px-6 py-3 rounded-xl hover:bg-gray-600 w-full sm:w-auto transition">New Estimate</button>
    </div>

  </div>

<script>
let materialsBody = document.getElementById("materialsBody");
let grandTotalEl = document.getElementById("grandTotal");

// SET DATE
document.getElementById("date").valueAsDate = new Date();

function extractNumber(qty) {
  const match = qty.match(/[\d.]+/);
  return match ? parseFloat(match[0]) : 0;
}

function format(num) {
  return Number(num || 0).toLocaleString();
}

function updateTotals() {
  let total = 0;
  const rows = materialsBody.querySelectorAll("tr");

  rows.forEach((row, index) => {
    row.querySelector(".no").textContent = index + 1;

    const qtyText = row.querySelector(".qty").value;
    const qty = extractNumber(qtyText);
    const unit = parseFloat(row.querySelector(".unit").value) || 0;

    const rowTotal = qty * unit;
    row.querySelector(".total").textContent = format(rowTotal);

    total += rowTotal;
  });

  grandTotalEl.textContent = format(total);
}

function addRow(material="", qty="", unit="") {
  const row = document.createElement("tr");

  row.innerHTML = `
    <td class="px-4 py-2 no"></td>
    <td class="px-4 py-2"><input type="text" class="w-full min-w-0 p-2 rounded bg-gray-700 border border-gray-600 material" value="${material}"></td>
    <td class="px-4 py-2"><input type="text" placeholder="10 bags" class="w-full min-w-0 p-2 rounded bg-gray-700 border border-gray-600 qty" value="${qty}"></td>
    <td class="px-4 py-2"><input type="number" step="any" class="w-full min-w-0 p-2 rounded bg-gray-700 border border-gray-600 unit" value="${unit}"></td>
    <td class="px-4 py-2 total">0</td>
    <td class="px-4 py-2 text-center"><button class="bg-red-600 px-3 py-1 rounded hover:bg-red-500 removeBtn">Remove</button></td>
  `;

  materialsBody.appendChild(row);

  row.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", updateTotals);
  });

  row.querySelector(".removeBtn").addEventListener("click", () => {
    row.remove();
    updateTotals();
  });

  updateTotals();
}

// BUTTONS
document.getElementById("addRowBtn").addEventListener("click", () => addRow());

// RESET
document.getElementById("newEstimate").addEventListener("click", () => {
  materialsBody.innerHTML = "";
  grandTotalEl.textContent = "0";
});

// PDF
document.getElementById("downloadPdf").addEventListener("click", () => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;
  doc.setFontSize(16);
  doc.text("Construction Estimate", 14, y);
  y += 10;

  materialsBody.querySelectorAll("tr").forEach((row, i) => {
    const material = row.querySelector(".material").value;
    const qty = row.querySelector(".qty").value;
    const unit = row.querySelector(".unit").value;
    const total = row.querySelector(".total").textContent;

    doc.setFontSize(12);
    doc.text(`${i + 1}. ${material} | ${qty} | ${unit} | ${total} ₣`, 14, y);
    y += 8;
  });

  y += 5;
  doc.setFontSize(14);
  doc.text(`Grand Total: ${grandTotalEl.textContent} ₣`, 14, y);

  doc.save("estimate.pdf");
});

// INIT
addRow();
</script>

</body>
</html>
