<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Estimator Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen p-4">

<div class="max-w-5xl mx-auto">

  <h1 class="text-3xl font-bold text-center mb-6">Estimator Pro 🚀</h1>

  <div class="bg-gray-800 p-4 rounded-2xl shadow-lg">

    <table class="w-full text-left text-sm">
      <thead>
        <tr class="text-gray-400 border-b border-gray-700">
          <th>No</th>
          <th>Item</th>
          <th>Qty</th>
          <th class="text-right">Unit Price</th>
          <th class="text-right">Total</th>
          <th></th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>
    </table>

    <!-- Buttons -->
    <div class="grid grid-cols-1 gap-2 mt-4">
      <button onclick="addRow()" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-700">
        + Add Item
      </button>

      <button onclick="generateShareLink()" class="bg-purple-600 p-3 rounded-xl">
        Share Estimate 🔗
      </button>

      <button onclick="downloadPDF(event)" class="bg-green-600 p-3 rounded-xl">
        Download PDF
      </button>
    </div>

    <!-- Grand Total -->
    <div class="mt-6 text-right text-xl font-bold">
      Grand Total: <span id="grandTotal">0</span>
    </div>

  </div>
</div>

<script>
let items = [];

/* FORMAT NUMBERS */
function formatNumber(num) {
  return Number(num || 0).toLocaleString();
}

/* EXTRACT NUMBER FROM "10 bags" */
function extractNumber(qtyText) {
  const match = qtyText.match(/[\\d.]+/);
  return match ? parseFloat(match[0]) : 0;
}

/* SAVE */
function saveData() {
  localStorage.setItem("estimate", JSON.stringify(items));
}

/* LOAD */
function loadData() {
  const saved = localStorage.getItem("estimate");
  if (saved) {
    items = JSON.parse(saved);
  } else {
    addRow();
  }
}

/* ADD ROW */
function addRow() {
  items.push({ item: "", qty: "", price: "" });
  render();
}

/* DELETE */
function deleteRow(index) {
  items.splice(index, 1);
  render();
}

/* UPDATE */
function updateItem(index, field, value) {
  items[index][field] = value;
  render();
}

/* RENDER */
function render() {
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  let grandTotal = 0;

  items.forEach((item, index) => {
    const qtyValue = extractNumber(item.qty);
    const price = Number(item.price || 0);
    const total = qtyValue * price;
    grandTotal += total;

    body.innerHTML += `
      <tr class="border-b border-gray-700">
        <td>${index + 1}</td>

        <td>
          <input 
            value="${item.item}" 
            oninput="updateItem(${index}, 'item', this.value)"
            class="bg-gray-700 p-2 rounded w-full"
          />
        </td>

        <td>
          <input 
            placeholder="e.g. 10 bags"
            value="${item.qty}" 
            oninput="updateItem(${index}, 'qty', this.value)"
            class="bg-gray-700 p-2 rounded w-full"
          />
        </td>

        <td>
          <input 
            type="number"
            step="any"
            value="${item.price}" 
            oninput="updateItem(${index}, 'price', this.value)"
            class="bg-gray-700 p-2 rounded w-full text-right"
          />
        </td>

        <td class="text-right">
          ${formatNumber(total)}
        </td>

        <td>
          <button onclick="deleteRow(${index})" class="text-red-400">🗑️</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("grandTotal").innerText = formatNumber(grandTotal);
  saveData();
}

/* PDF */
async function downloadPDF(event) {
  const btn = event.target;
  btn.innerText = "Generating...";

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("Estimator Pro", 14, 20);

  let y = 40;

  doc.setFontSize(12);
  doc.text("No  Item   Qty   Unit Price   Total", 14, y);
  y += 10;

  let grandTotal = 0;

  items.forEach((item, index) => {
    const qtyValue = extractNumber(item.qty);
    const total = qtyValue * item.price;
    grandTotal += total;

    doc.text(
      `${index + 1}  ${item.item}  ${item.qty}  ${formatNumber(item.price)}  ${formatNumber(total)}`,
      14,
      y
    );
    y += 10;
  });

  y += 10;
  doc.text(`Grand Total: ${formatNumber(grandTotal)}`, 14, y);

  doc.save("estimate.pdf");

  btn.innerText = "Download PDF";
}

/* SHARE */
function generateShareLink() {
  const data = btoa(JSON.stringify(items));
  const url = `${window.location.origin}?data=${data}`;
  navigator.clipboard.writeText(url);
  alert("Share link copied!");
}

/* LOAD FROM URL */
function loadFromURL() {
  const params = new URLSearchParams(window.location.search);
  const data = params.get("data");

  if (data) {
    items = JSON.parse(atob(data));
  }
}

/* INIT */
window.onload = () => {
  loadFromURL();
  loadData();
  render();
};
</script>

</body>
</html>
