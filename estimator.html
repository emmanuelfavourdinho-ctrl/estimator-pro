<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estimator Pro - Professional PDF</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-950 text-white"><!-- NAVBAR --><header class="flex justify-between items-center p-6 border-b border-gray-800">
  <h1 class="text-xl font-bold tracking-wide">Estimator Pro</h1>
  <button id="newEstimateBtn" class="bg-blue-600 px-4 py-2 rounded-xl hover:bg-blue-500 transition">New Estimate</button>
</header><!-- MAIN CONTAINER --><div class="max-w-4xl mx-auto p-6">  <!-- TITLE -->  <div class="mb-8">
    <h2 class="text-3xl font-bold mb-2">Construction Estimate</h2>
    <p class="text-gray-400">Create a professional estimate in seconds</p>
  </div>  <!-- FORM CARD -->  <div class="bg-gray-900 p-6 rounded-2xl shadow-lg"><!-- CONTRACTOR INFO -->
<div class="mb-6">
  <h3 class="text-lg font-semibold mb-4">Contractor Info</h3>
  <input id="contractorName" type="text" placeholder="Company / Contractor Name" class="w-full mb-3 p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none">
  <input id="contractorPhone" type="text" placeholder="Phone Number" class="w-full mb-3 p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none">
  <input id="contractorEmail" type="email" placeholder="Email Address" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none">
</div>

<!-- CLIENT INFO -->
<div class="mb-6">
  <h3 class="text-lg font-semibold mb-4">Client Info</h3>
  <input type="text" placeholder="Client Name" class="w-full mb-3 p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none">
  <input type="text" placeholder="Project Name" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none">
</div>

<!-- MATERIAL TABLE -->
<div class="mb-6">
  <h3 class="text-lg font-semibold mb-4">Materials</h3>
  <table class="w-full text-left">
    <thead>
      <tr class="text-gray-400 text-sm">
        <th class="pb-2">Item</th>
        <th>Qty</th>
        <th>Unit Price</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="materials">
      <tr>
        <td><input class="p-2 bg-gray-800 rounded w-full"></td>
        <td><input type="number" class="p-2 bg-gray-800 rounded w-full" oninput="calc()"></td>
        <td><input type="number" class="p-2 bg-gray-800 rounded w-full" oninput="calc()"></td>
        <td class="p-2">0</td>
      </tr>
    </tbody>
  </table>
  <button onclick="addRow()" class="mt-4 text-blue-400 hover:underline">+ Add Item</button>
</div>

<!-- TOTAL -->
<div class="flex justify-between items-center border-t border-gray-800 pt-4">
    <h3 class="text-xl font-semibold">Total</h3>
    <h3 id="grandTotal" class="text-2xl font-bold">0 FCFA</h3>
</div>

<!-- ACTIONS -->
<div class="mt-6 flex gap-4">
    <button onclick="downloadPDF()" class="bg-green-600 px-6 py-3 rounded-xl hover:bg-green-500 transition">Download PDF</button>
    <button class="bg-gray-700 px-6 py-3 rounded-xl hover:bg-gray-600 transition">Save</button>
</div>

    </div></div><script>
function addRow() {
    const table = document.getElementById('materials');
    const row = `
    <tr>
    <td><input class="p-2 bg-gray-800 rounded w-full"></td>
    <td><input type="number" class="p-2 bg-gray-800 rounded w-full" oninput="calc()"></td>
    <td><input type="number" class="p-2 bg-gray-800 rounded w-full" oninput="calc()"></td>
    <td class="p-2">0</td>
    </tr>`;
    table.insertAdjacentHTML('beforeend', row);
}

function calc() {
    let total = 0;
    const rows = document.querySelectorAll('#materials tr');
    rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const qty = inputs[1].value || 0;
    const price = inputs[2].value || 0;
    const rowTotal = qty * price;
    row.children[3].innerText = rowTotal;
    total += rowTotal;
});
    document.getElementById('grandTotal').innerText = total + ' FCFA';
}

function newEstimate() {
  // Clear contractor info
    document.getElementById('contractorName').value = '';
    document.getElementById('contractorPhone').value = '';
    document.getElementById('contractorEmail').value = '';

  // Clear client info
    document.querySelector('input[placeholder="Client Name"]').value = '';
    document.querySelector('input[placeholder="Project Name"]').value = '';

  // Reset materials table to one empty row
    const table = document.getElementById('materials');
    table.innerHTML = `<tr>
    <td><input class="p-2 bg-gray-800 rounded w-full"></td>
    <td><input type="number" class="p-2 bg-gray-800 rounded w-full" oninput="calc()"></td>
    <td><input type="number" class="p-2 bg-gray-800 rounded w-full" oninput="calc()"></td>
    <td class="p-2">0</td>
    </tr>`;

  // Reset grand total
    document.getElementById('grandTotal').innerText = '0 FCFA';
}

document.getElementById('newEstimateBtn').addEventListener('click', newEstimate);

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const date = new Date().toLocaleDateString();

    // Contractor info
    const contractorName = document.getElementById('contractorName').value || 'N/A';
    const contractorPhone = document.getElementById('contractorPhone').value || 'N/A';
    const contractorEmail = document.getElementById('contractorEmail').value || 'N/A';

    // Client info
    const clientName = document.querySelector('input[placeholder="Client Name"]').value || 'N/A';
    const projectName = document.querySelector('input[placeholder="Project Name"]').value || 'N/A';

    // Header
    doc.setFontSize(18);
    doc.text("Estimator Pro - Construction Estimate", 14, 20);
    doc.setFontSize(11);
    doc.text(`Date: ${date}`, 14, 28);
    doc.text(`Contractor: ${contractorName}`, 14, 34);
    doc.text(`Phone: ${contractorPhone} | Email: ${contractorEmail}`, 14, 40);

    // Client info
    doc.text(`Client: ${clientName}`, 14, 50);
    doc.text(`Project: ${projectName}`, 14, 56);

    // Table
    const rows = document.querySelectorAll('#materials tr');
    const tableData = [];
    let grandTotal = 0;
    rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const item = inputs[0].value || '-';
        const qty = Number(inputs[1].value) || 0;
        const price = Number(inputs[2].value) || 0;
        const total = qty * price;
        grandTotal += total;
        tableData.push([item, qty.toString(), price.toString(), total.toString()]);
    });

    doc.autoTable({
    startY: 65,
    head: [['Item', 'Qty', 'Unit Price', 'Total']],
    body: tableData,
    theme: 'grid',
    headStyles: { fillColor: [51, 65, 85], textColor: 255 },
    styles: { fontSize: 10, cellPadding: 3 }
    });

    doc.setFontSize(14);
    doc.text(`GRAND TOTAL: ${grandTotal} FCFA`, 14, doc.lastAutoTable.finalY + 10);
    doc.text("Thank you for your business!", 14, doc.lastAutoTable.finalY + 20);

    doc.save("Professional_Estimate.pdf");
}
</script></body>
</html>
